<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 24px; color: var(--text-primary); }
  .row { display: flex; gap: 20px; align-items: stretch; }
  .tile { flex: 1; border-radius: 16px; display: flex; align-items: center; gap: 14px; padding: 22px; }
  .tile.lime { background: #fff; border: 1px solid #eee; }
  .tile.dark { background: #141414; }
  .mark { width: 56px; height: 56px; border-radius: 16px; background: var(--secondary-600); display: grid; place-items: center; flex: none; }
  .mark i { width: 34px; height: 34px; color: #141414; }
  .wm { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="tile lime">
      <div class="mark"><i data-lucide="bean"></i></div>
      <div><div class="wm">Bean</div><div class="sub">logo + wordmark · light</div></div>
    </div>
    <div class="tile dark">
      <div class="mark"><i data-lucide="bean"></i></div>
      <div><div class="wm" style="color:#fff">Bean</div><div class="sub">on dark</div></div>
    </div>
  </div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
</body>
</html>
