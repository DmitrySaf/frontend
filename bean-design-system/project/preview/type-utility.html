<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 24px; color: var(--text-primary); }
  .cap { font-size: 13px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 16px; }
  .line { display: flex; align-items: baseline; gap: 18px; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,.05); }
  .line:last-child { border: 0; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); width: 150px; flex: none; }
  .btn { font-weight: 600; font-size: 14px; line-height: 120%; }
  .lbl { font-weight: 500; font-size: 14px; }
  .help { font-size: 12px; color: var(--text-tertiary); }
  .capt { font-weight: 500; font-size: 12px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="cap">Utility · Button / Input / Caption</div>
  <div class="line"><span class="spec">Button · 600 · 14</span><span class="btn">Продолжить</span></div>
  <div class="line"><span class="spec">Input label · 500 · 14</span><span class="lbl">Имя пользователя</span></div>
  <div class="line"><span class="spec">Placeholder · 400 · 16</span><span style="font-size:16px;color:#8f8f8f">Введите имя</span></div>
  <div class="line"><span class="spec">Helper / Error · 400 · 12</span><span class="help">Подтвердите свою личность</span></div>
  <div class="line"><span class="spec">Caption M · 500 · 12</span><span class="capt">t.me/ xtsumi</span></div>
  <div class="line"><span class="spec">Mono · Geist Mono</span><span class="bean-mono" style="font-size:14px">@tsumi · 0071E3</span></div>
</body>
</html>
