<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 24px; color: var(--text-primary); }
  .fams { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .fam .nm { font-size: 13px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 6px; }
  .fam .glyphs { font-size: 40px; font-weight: 600; line-height: 1.1; }
  .fam .ws { font-size: 13px; color: var(--text-secondary); margin-top: 8px; display:flex; gap:10px; flex-wrap:wrap; }
  .fam .ws span { color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="fams">
    <div class="fam">
      <div class="nm">GEIST — UI</div>
      <div class="glyphs" style="font-family:var(--font-sans)">Aa Бб Яя 0123</div>
      <div class="ws" style="font-family:var(--font-sans)">
        <span style="font-weight:300">Light</span><span style="font-weight:400">Regular</span><span style="font-weight:500">Medium</span><span style="font-weight:600">SemiBold</span><span style="font-weight:700">Bold</span>
      </div>
    </div>
    <div class="fam">
      <div class="nm">GEIST MONO — code / numeric</div>
      <div class="glyphs" style="font-family:var(--font-mono)">Aa 0123</div>
      <div class="ws" style="font-family:var(--font-mono)">
        <span style="font-weight:400">Regular</span><span style="font-weight:500">Medium</span><span style="font-weight:700">Bold</span>
      </div>
    </div>
  </div>
</body>
</html>
