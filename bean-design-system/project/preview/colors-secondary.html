<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 22px 24px; color: var(--text-primary); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-card); }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; }
  .sw span { font-family: var(--font-mono); font-size: 10px; color: #2c3d12; }
  .cap { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .cap b { font-size: 15px; font-weight: 600; }
  .cap em { font-style: normal; font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="cap"><b>Secondary — Lime</b><em>logo tile · #DEFCAD · brand identity, used sparingly</em></div>
  <div class="row" id="row"></div>
<script>
  const steps = [
    ['200','#f1fede'],['300','#ebfdce'],['400','#e6fdc2'],['500','#e2fdb8'],
    ['600','#defcad'],['700','#d4fb90'],['800','#cbfa78'],['900','#c2f961']
  ];
  document.getElementById('row').innerHTML = steps.map(([k,v]) =>
    `<div class="sw" style="background:${v}"><span>${k}</span><span>${v.toUpperCase()}</span></div>`
  ).join('');
</script>
</body>
</html>
