<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 24px; color: var(--text-primary); }
  .cap { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .item { text-align: center; }
  .bar { background: var(--primary-600); border-radius: 3px; width: 100%; }
  .item .t { display: block; font-family: var(--font-mono); font-size: 11px; font-weight:600; margin-top: 8px; }
</style>
</head>
<body>
  <div class="cap">Spacing scale — 4px base</div>
  <div class="row" id="row"></div>
<script>
  const v = [4,8,12,16,20,24,32,40,48,64];
  document.getElementById('row').innerHTML = v.map(n =>
    `<div class="item" style="flex:0 0 auto"><div class="bar" style="height:${n}px;width:${Math.max(n,18)}px"></div><span class="t">${n}</span></div>`
  ).join('');
</script>
</body>
</html>
