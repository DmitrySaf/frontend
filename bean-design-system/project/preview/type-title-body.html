<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 24px; color: var(--text-primary); }
  .cap { font-size: 13px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 16px; }
  .line { display: flex; align-items: baseline; gap: 18px; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,.05); }
  .line:last-child { border: 0; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); width: 120px; flex: none; }
  .used { display:inline-block; font-size:9px; font-weight:700; color:#0071e3; background:rgba(0,113,227,.1); border-radius:300px; padding:2px 7px; margin-left:8px; vertical-align:middle; }
</style>
</head>
<body>
  <div class="cap">Title &amp; Body · Geist</div>
  <div class="line"><span class="spec">Title M · 600 · 24</span><span class="bean-title-m">Имя пользователя</span></div>
  <div class="line"><span class="spec">Title S · 500 · 20</span><span class="bean-title-s">О себе</span></div>
  <div class="line"><span class="spec">Body L · 400 · 18</span><span class="bean-body-l">Расскажите немного о себе и аудитории.</span></div>
  <div class="line"><span class="spec">Body M · 400 · 16<span class="used">Used</span></span><span class="bean-body-m">Основной текст интерфейса — рабочая лошадка.</span></div>
  <div class="line"><span class="spec">Body S · 400 · 14<span class="used">Used</span></span><span class="bean-body-s">Вторичный текст и подписи в плотных блоках.</span></div>
</body>
</html>
