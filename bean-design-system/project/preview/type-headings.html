<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 24px; color: var(--text-primary); }
  .cap { font-size: 13px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 18px; }
  .line { display: flex; align-items: baseline; gap: 18px; padding: 9px 0; border-bottom: 1px solid rgba(0,0,0,.05); }
  .line:last-child { border: 0; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); width: 130px; flex: none; }
</style>
</head>
<body>
  <div class="cap">Headings · Geist</div>
  <div class="line"><span class="spec">H1 · 700 · 36</span><span class="bean-h1">Возможности заработка</span></div>
  <div class="line"><span class="spec">H2 · 600 · 28</span><span class="bean-h2">Настройки профиля</span></div>
  <div class="line"><span class="spec">H3 · 600 · 22</span><span class="bean-h3">Подключение соцсетей</span></div>
  <div class="line"><span class="spec">H4 · 500 · 18</span><span class="bean-h4">Способ вывода средств</span></div>
</body>
</html>
